<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyBox</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />

    <style>
        /* Изначально всё на странице скрыто, чтобы не было «мигания» контента */
        html, body {
            margin: 0; padding: 0;
            background-color: #ffffff;
            font-family: 'Google Sans', sans-serif;
            height: 100%; width: 100%;
            display: flex; align-items: center; justify-content: center;
        }

        #app, #blockScreen { display: none; text-align: center; padding: 20px; }

        .icon-red { font-size: 80px; color: #ea4335; margin-bottom: 20px; }
        h1 { font-size: 24px; font-weight: 500; margin-bottom: 12px; }
        p { color: #5f6368; max-width: 300px; line-height: 1.5; margin: 0 auto; }

        /* Лоадер, пока идет проверка */
        #loader { display: block; color: #4285f4; font-size: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <span class="material-symbols-rounded" style="font-size: 50px;">sync</span>
    </div>

    <div id="blockScreen">
        <span class="material-symbols-rounded icon-red">shield_lock</span>
        <h1>Регион не поддерживается</h1>
        <p>К сожалению, StudyBox пока не поддерживает ваш регион. Мы расширяем списки доступных стран.</p>
    </div>

    <div id="app">
        <h1 style="color: #1a73e8;">StudyBox Активен</h1>
        <p>Ваша страна прошла проверку безопасности.</p>
    </div>

    <script>
        async function checkGeo() {
            const loader = document.getElementById('loader');
            const blockScreen = document.getElementById('blockScreen');
            const app = document.getElementById('app');

            try {
                // Используем надежный API с защитой от кэша
                const response = await fetch('https://ipapi.co/json/?nocache=' + Math.random());
                const data = await response.json();

                // --- ТЕСТОВАЯ ЛОГИКА ---
                // Замени 'RU' на 'BY', чтобы заблокировать себя в Беларуси
                const targetCountry = 'RU'; 

                if (data.country_code === targetCountry) {
                    // ЕСЛИ РОССИЯ:
                    loader.style.display = 'none';
                    blockScreen.style.display = 'block';
                    app.remove(); // Полностью удаляем код сайта из страницы
                } else {
                    // ЕСЛИ ДРУГАЯ СТРАНА:
                    loader.style.display = 'none';
                    app.style.display = 'block';
                }

            } catch (error) {
                // Если API заблокирован или нет интернета
                loader.style.display = 'none';
                blockScreen.style.display = 'block'; // Блокируем на всякий случай
                console.error("Geo Error");
            }
        }

        // Запускаем мгновенно
        checkGeo();
    </script>
</body>
</html>
