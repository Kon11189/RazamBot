<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>UpScale Pro</title>
    <style>
        body { margin: 0; background: #050508; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; -webkit-user-select: none; }
        .card { text-align: center; background: #11111d; padding: 30px; border-radius: 25px; width: 85%; border: 1px solid #4facfe; }
        #launch-btn { 
            background: #4facfe; border: none; padding: 30px; border-radius: 20px; 
            color: #000; font-size: 22px; width: 100%; cursor: pointer; font-weight: bold;
            touch-action: none; /* Важно для мобилок */
        }
        #launch-btn:active { background: #ff3e3e; color: #fff; transform: scale(0.95); }
        #status { margin: 20px 0; color: #4facfe; font-weight: bold; text-transform: uppercase; }
        #console { background: #000; color: #0f0; font-family: monospace; font-size: 11px; padding: 12px; border-radius: 10px; height: 120px; overflow-y: auto; text-align: left; border: 1px solid #222; }
    </style>
</head>
<body>

<div class="card">
    <h1>UPSCALE</h1>
    <div id="status">ЗАЖМИ И ГОВОРИ</div>
    <button id="launch-btn">УДЕРЖИВАЙ</button>
    <div id="console">Система 2.5 Lite готова...</div>
</div>

<script>
    const API_KEY = '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';
    const MODEL = 'google/gemini-2.0-flash-lite-preview-02-05';

    const btn = document.getElementById('launch-btn');
    const status = document.getElementById('status');
    const cons = document.getElementById('console');

    const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = new Speech();
    rec.lang = 'ru-RU';
    rec.continuous = false;

    function log(msg) { cons.innerHTML += `<div>> ${msg}</div>`; cons.scrollTop = cons.scrollHeight; }

    // СОБЫТИЕ: НАЖАЛ И ДЕРЖИШЬ
    btn.ontouchstart = (e) => {
        e.preventDefault();
        status.innerText = "СЛУШАЮ...";
        log("Запись пошла...");
        rec.start();
    };

    // СОБЫТИЕ: ОТПУСТИЛ ПАЛЕЦ
    btn.ontouchend = () => {
        status.innerText = "ОБРАБОТКА...";
        log("Отправка...");
        rec.stop();
    };

    rec.onresult = (e) => {
        const text = e.results[0][0].transcript;
        log("ТЫ: " + text);
        askNick(text);
    };

    rec.onerror = (e) => { 
        if(e.error !== 'no-speech') log("ОШИБКА: " + e.error);
    };

    async function askNick(text) {
        try {
            const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ "model": MODEL, "messages": [{"role": "user", "content": text}] })
            });
            const data = await res.json();
            const reply = data.choices[0].message.content;
            log("НИК: " + reply.substring(0, 30) + "...");
            speak(reply);
        } catch(e) { log("Сбой: " + e.message); }
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(text);
        m.lang = 'ru-RU';
        window.speechSynthesis.speak(m);
        m.onend = () => status.innerText = "ЗАЖМИ И ГОВОРИ";
    }
</script>
</body>
</html>
