<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>StudyBox — Ограничение доступа</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />

    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #202124;
            --text-secondary: #5f6368;
            --accent-muted: #70757a;
            --error-muted: #d93025;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            font-family: 'Google Sans', sans-serif;
            height: 100vh; width: 100vw;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Экран блокировки */
        #blockScreen {
            display: none;
            text-align: center;
            padding: 40px 20px;
            max-width: 380px;
            animation: fadeIn 1.2s ease-out;
        }

        .shield-icon {
            font-size: 96px;
            color: var(--accent-muted);
            opacity: 0.4;
            margin-bottom: 32px;
            display: inline-block;
        }

        h1 {
            font-size: 24px;
            font-weight: 500;
            color: var(--text-main);
            margin: 0 0 16px 0;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin: 0 0 40px 0;
        }

        .divider {
            width: 40px;
            height: 1px;
            background-color: #e8eaed;
            margin: 0 auto 30px;
        }

        .footer-note {
            font-size: 12px;
            color: #9aa0a6;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Загрузка */
        #loader {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dot-pulse {
            width: 8px; height: 8px; border-radius: 50%;
            background-color: var(--accent-muted);
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.1); } }

        /* Контент сайта (скрыт по умолчанию) */
        #app { display: none; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="dot-pulse"></div>
    </div>

    <div id="blockScreen">
        <span class="material-symbols-rounded shield-icon">shield_with_house</span>
        <h1>StudyBox недоступен</h1>
        <p>
            Нам очень жаль, но в данный момент сервис не поддерживает ваш регион. Мы ценим ваш интерес, но соблюдение локальных ограничений является приоритетом нашей безопасности.
        </p>
        <div class="divider"></div>
        <div class="footer-note">Доступ ограничен</div>
    </div>

    <div id="app">
        <h1>Добро пожаловать</h1>
        </div>

    <script>
        async function runSecurity() {
            const loader = document.getElementById('loader');
            const blockScreen = document.getElementById('blockScreen');
            const app = document.getElementById('app');

            try {
                // Используем детальный API для отсечения VPN
                const response = await fetch('https://ipwho.is/');
                const data = await response.json();

                // Условия блокировки
                const isRussia = (data.country_code === 'RU');
                const isVpn = data.security && data.security.proxy;
                const isHosting = data.connection && data.connection.type === 'hosting';

                // Если блокировка подтверждена
                if (isRussia || isVpn || isHosting) {
                    loader.style.display = 'none';
                    blockScreen.style.display = 'block';
                    app.remove(); // Стираем код сайта из памяти
                } else {
                    loader.style.display = 'none';
                    app.style.display = 'block';
                }

            } catch (err) {
                // Если API проверки недоступен (часто из-за блокировок РКН), закрываем вход
                loader.style.display = 'none';
                blockScreen.style.display = 'block';
            }
        }

        runSecurity();
    </script>
</body>
</html>
