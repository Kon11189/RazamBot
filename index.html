<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL_OVERRIDE</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body, html {
            background-color: #000;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Убираем полосы прокрутки */
        }

        #terminal {
            width: 100vw;
            height: 100vh;
            display: block;
            word-break: break-all;
            overflow: hidden;
            font-size: 16px; /* Размер шрифта для плотного заполнения */
            line-height: 1;
            padding: 0;
            margin: 0;
            text-transform: uppercase;
        }

        /* Тот самый зеленый ЖК экран в конце */
        #balance-screen {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: #000;
            border: 4px solid #00ff00;
            padding: 60px;
            z-index: 100;
            box-shadow: 0 0 50px #004400;
        }

        .lcd-text {
            font-size: 100px;
            color: #33ff33;
            text-shadow: 0 0 20px #33ff33;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
        }

        .label {
            font-size: 24px;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        /* Полоски старого монитора поверх всего */
        .crt-scan {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 200;
        }
    </style>
</head>
<body>

<div class="crt-scan"></div>
<div id="terminal"></div>

<div id="balance-screen">
    <div class="label">ACCOUNT BALANCE:</div>
    <div id="balance" class="lcd-text">0.0000$</div>
    <div style="font-size: 14px; margin-top: 20px;">+1.00 USD / MIN</div>
</div>

<script>
    const term = document.getElementById('terminal');
    const screen = document.getElementById('balance-screen');
    const balEl = document.getElementById('balance');

    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789<>[]{}/\\|!@#$%^&*()_+-=";
    let startTime = Date.now();
    let balance = 0.0000;

    function runVirus() {
        let elapsed = Date.now() - startTime;

        if (elapsed < 10000) { // Работает 10 секунд
            // Генерируем огромный блок текста для заполнения всей ширины
            let line = "";
            let width = Math.floor(window.innerWidth / 10); // Рассчитываем ширину строки

            for (let i = 0; i < 5; i++) {
                let segment = "";
                for (let j = 0; j < width; j++) {
                    segment += chars[Math.floor(Math.random() * chars.length)];
                }
                let div = document.createElement('div');
                div.textContent = segment;
                
                // Иногда красим в белый или красный для "глюка"
                if (Math.random() > 0.95) div.style.color = "#fff";
                if (Math.random() > 0.98) div.style.color = "#ff0000";

                term.appendChild(div);
            }

            // Удаляем старые строки, чтобы браузер не «упал»
            if (term.childNodes.length > 60) {
                term.removeChild(term.firstChild);
            }

            requestAnimationFrame(runVirus);
        } else {
            // Переход к балансу
            term.style.display = 'none';
            screen.style.display = 'block';
            startEarning();
        }
    }

    function startEarning() {
        const perSecond = 1 / 60;
        const tick = 50;
        setInterval(() => {
            balance += perSecond / (1000 / tick);
            balEl.textContent = balance.toFixed(4) + "$";
        }, tick);
    }

    // Старт
    runVirus();
</script>

</body>
</html>
